<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informes de Fichajes — fichaje 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1a1a; --ink-soft: #5a5a5a; --ink-muted: #9a9a9a;
  --paper: #f8f6f1; --paper-dark: #edeae2; --paper-darker: #e0dcd2;
  --accent: #c84b2f; --accent-soft: #f0d5ce;
  --green: #2d6a4f; --green-soft: #d8f3dc;
  --amber: #b5740a; --amber-soft: #fef3c7;
  --blue: #1a4e8a; --blue-soft: #dbeafe;
  --border: rgba(26,26,26,0.11); --border-strong: rgba(26,26,26,0.22);
  --r: 4px; --rl: 8px;
}
html { font-size: 15px; }
body { font-family: 'Syne', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

.hdr { background: var(--ink); color: var(--paper); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--accent); }
.hdr h1 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: var(--paper); }
.hdr h1 em { color: var(--accent); font-style: normal; }
.hdr-sub { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: #777; letter-spacing: .1em; text-transform: uppercase; }

.shell { display: grid; grid-template-columns: 290px 1fr; min-height: calc(100vh - 60px); }

.side { background: var(--paper-dark); border-right: 1px solid var(--border); padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 1.5rem; }
.sec-lbl { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: .6rem; display: block; }

.emp-list { display: flex; flex-direction: column; gap: 2px; max-height: 280px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--r); background: white; padding: 5px; }
.emp-list::-webkit-scrollbar { width: 4px; }
.emp-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
.emp-row { display: flex; align-items: center; gap: 8px; padding: 5px 7px; border-radius: var(--r); cursor: pointer; }
.emp-row:hover { background: var(--paper-dark); }
.emp-row input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; flex-shrink: 0; cursor: pointer; }
.emp-row label { font-size: 0.78rem; cursor: pointer; line-height: 1.3; }
.emp-btns { display: flex; gap: 6px; margin-bottom: 6px; }
.btn-xs { padding: 3px 9px; font-size: 0.68rem; font-family: 'Syne', sans-serif; font-weight: 600; border: 1px solid var(--border-strong); background: white; border-radius: var(--r); cursor: pointer; color: var(--ink-soft); transition: all .1s; }
.btn-xs:hover { background: var(--ink); color: white; border-color: var(--ink); }

.date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.df { display: flex; flex-direction: column; gap: 3px; }
.df span { font-size: 0.68rem; font-weight: 600; color: var(--ink-soft); }
.df input[type=date] { padding: 6px 8px; font-family: 'DM Mono', monospace; font-size: 0.7rem; background: white; border: 1px solid var(--border-strong); border-radius: var(--r); color: var(--ink); outline: none; width: 100%; }
.df input:focus { border-color: var(--accent); }

.status { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--ink-muted); font-family: 'DM Mono', monospace; }
.sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--paper-darker); flex-shrink: 0; transition: background .3s; }
.sdot.ok { background: var(--green); }
.sdot.err { background: var(--accent); }
.sdot.spin { background: var(--amber); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.35} }

.btn-gen { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--r); font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; letter-spacing: .04em; transition: opacity .15s; }
.btn-gen:hover { opacity: .85; }
.btn-gen:disabled { opacity: .35; cursor: not-allowed; }
.btn-xl { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; background: #1d6f42; color: white; border: none; border-radius: var(--r); font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.btn-xl:hover { opacity: .85; }
.btn-xl svg { width: 15px; height: 15px; flex-shrink: 0; }

.main { padding: 1.75rem 2rem; overflow-x: auto; }

.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 55vh; gap: .75rem; text-align: center; }
.empty-icon { font-size: 3rem; opacity: .2; }
.empty h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--ink-soft); font-weight: 400; }
.empty p { font-size: 0.8rem; color: var(--ink-muted); max-width: 320px; line-height: 1.6; }

.rep-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
.rep-title { font-family: 'DM Serif Display', serif; font-size: 1.7rem; font-weight: 400; }
.rep-meta { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--ink-muted); margin-top: 3px; }

.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 2rem; }
.kpi { background: white; border: 1px solid var(--border); border-radius: var(--rl); padding: .9rem 1rem; position: relative; overflow: hidden; }
.kpi::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; }
.kpi.g::before { background: var(--green); }
.kpi.b::before { background: var(--blue); }
.kpi.a::before { background: var(--amber); }
.kpi.r::before { background: var(--accent); }
.kpi-lbl { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 5px; }
.kpi-val { font-family: 'DM Serif Display', serif; font-size: 1.9rem; line-height: 1; color: var(--ink); }
.kpi-sub { font-size: 0.67rem; color: var(--ink-muted); margin-top: 3px; }

.emp-section { margin-bottom: 2.5rem; }
.emp-sec-hdr { display: flex; align-items: center; gap: 10px; padding-bottom: .5rem; border-bottom: 1px solid var(--border); margin-bottom: .75rem; flex-wrap: wrap; }
.emp-sec-name { font-family: 'DM Serif Display', serif; font-size: 1.15rem; font-weight: 400; }
.chip { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 0.65rem; font-family: 'DM Mono', monospace; font-weight: 500; }
.chip-blue { background: var(--blue-soft); color: var(--blue); }
.chip-green { background: var(--green-soft); color: var(--green); }

.emp-summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: .75rem; }
.esm { background: var(--paper-dark); border-radius: var(--r); padding: 6px 12px; font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--ink-soft); }
.esm strong { color: var(--ink); font-weight: 500; }

.twrap { border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 600px; }
thead { background: var(--ink); }
th { padding: 9px 13px; text-align: left; color: var(--paper); font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: .1em; text-transform: uppercase; font-weight: 500; white-space: nowrap; }
td { padding: 7px 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fdf6f4; }
.tfoot-r td { background: var(--paper-dark); font-family: 'DM Mono', monospace; font-size: 0.72rem; font-weight: 500; border-top: 1.5px solid var(--border-strong); }

.tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.64rem; font-family: 'DM Mono', monospace; font-weight: 500; white-space: nowrap; }
.t-in  { background: var(--green-soft); color: var(--green); }
.t-out { background: var(--blue-soft);  color: var(--blue);  }
.t-ok  { background: var(--green-soft); color: var(--green); }
.t-warn{ background: var(--amber-soft); color: var(--amber); }
.t-err { background: var(--accent-soft);color: var(--accent);}

/* Debug panel */
.debug-panel { background: #1a1a1a; color: #00ff88; font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 10px 14px; border-radius: var(--r); margin-bottom: 1rem; display: none; max-height: 160px; overflow-y: auto; line-height: 1.7; }
.debug-panel.on { display: block; }
.debug-panel .d-ok  { color: #00ff88; }
.debug-panel .d-err { color: #ff6b6b; }
.debug-panel .d-info{ color: #87ceeb; }
.debug-toggle { font-size: 0.65rem; font-family: 'DM Mono', monospace; color: var(--ink-muted); cursor: pointer; text-decoration: underline; display: block; margin-bottom: .5rem; }

.loader { display: none; position: fixed; inset: 0; background: rgba(248,246,241,.82); z-index: 500; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
.loader.on { display: flex; }
.spin { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: rot .65s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.loader-txt { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--ink-soft); }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--ink); color: var(--paper); padding: 9px 16px; border-radius: var(--rl); font-size: 0.75rem; font-family: 'DM Mono', monospace; z-index: 600; opacity: 0; transform: translateY(10px); transition: all .22s; pointer-events: none; max-width: 300px; }
.toast.on  { opacity: 1; transform: translateY(0); }
.toast.err { background: var(--accent); }

@media (max-width: 720px) {
  .shell { grid-template-columns: 1fr; }
  .side { border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 1rem; }
  .hdr { padding: 0 1rem; }
}
</style>
</head>
<body>

<header class="hdr">
  <h1>Fichajes <em>&</em> Informes</h1>
  <span class="hdr-sub">fichaje 2026 · RRHH</span>
</header>

<div class="shell">
  <aside class="side">
    <div>
      <span class="sec-lbl">Conexión</span>
      <div class="status">
        <span class="sdot spin" id="sdot"></span>
        <span id="stxt">Cargando empleados...</span>
      </div>
    </div>

    <div>
      <span class="sec-lbl">Empleados</span>
      <div class="emp-btns">
        <button class="btn-xs" onclick="selAll()">Todos</button>
        <button class="btn-xs" onclick="selNone()">Ninguno</button>
      </div>
      <div class="emp-list" id="emp-list">
        <span style="font-size:.72rem;color:var(--ink-muted);padding:8px;font-family:'DM Mono',monospace">Cargando...</span>
      </div>
    </div>

    <div>
      <span class="sec-lbl">Período</span>
      <div class="date-grid">
        <div class="df"><span>Desde</span><input type="date" id="f-desde"></div>
        <div class="df"><span>Hasta</span><input type="date"  id="f-hasta"></div>
      </div>
    </div>

    <button class="btn-gen" id="btn-gen" onclick="generar()" disabled>Generar informe</button>
  </aside>

  <main class="main" id="main">
    <div class="empty" id="empty">
      <div class="empty-icon">📋</div>
      <h2>Listo para generar</h2>
      <p>Selecciona empleados y período, luego pulsa <strong>Generar informe</strong>.</p>
    </div>
    <!-- Panel de debug siempre en DOM -->
    <span class="debug-toggle" id="debug-toggle" style="display:none" onclick="toggleDebug()">▸ Ver log de depuración</span>
    <div class="debug-panel" id="debug-panel"></div>
    <div id="report" style="display:none"></div>
  </main>
</div>

<div class="loader" id="loader"><div class="spin"></div><div class="loader-txt" id="ltxt">Cargando...</div></div>
<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1AHGLfzT-yF2kkPUS8IlygX9TAL6poYVnxBmoI_p-550';

const EMPLEADOS_DEFAULT = [
  'LUCIANA Fisbein Efron',
  'RICHARD Silva Vera',
  'ANA HILDA MIRANDA ROCHA',
  'JESSICA Arribas Caravaca',
  'JULIO Morales Romero',
  'MARIA LUZ Nuñez Fuentes',
  'RAMIRO DAMIAN Martinez Chapper',
  'SHENAY Nazimova Cholakova',
  'YAMILA Fisbein Efron'
];

let empleados = [];
let sheetNamesCache = null; // Cache de nombres reales de pestañas

// ── Debug log ──────────────────────────────────────────────
const dbgLines = [];
function dbg(msg, cls='d-info') {
  const t = new Date().toLocaleTimeString('es-ES');
  dbgLines.push('<span class="' + cls + '">[' + t + '] ' + msg + '</span>');
  const el = document.getElementById('debug-panel');
  if (el) { el.innerHTML = dbgLines.join('<br>'); el.scrollTop = el.scrollHeight; }
}

// ── Helpers UI ──────────────────────────────────────────────
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on' + (err ? ' err' : '');
  setTimeout(() => t.className = 'toast', 3200);
}
function setLoader(on, msg='') {
  document.getElementById('loader').classList.toggle('on', on);
  if (msg) document.getElementById('ltxt').textContent = msg;
}
function setStatus(cls, msg) {
  document.getElementById('sdot').className = 'sdot ' + cls;
  document.getElementById('stxt').textContent = msg;
}
function toggleDebug() {
  const el = document.getElementById('debug-panel');
  el.classList.toggle('on');
}

// ── Normalizar nombre (para comparar, no para la URL) ──────
function normName(s) {
  return String(s || '').trim().replace(/\s+/g, ' ');
}

// ── Fetch directo (funciona con file:// y http://) ──────────
async function fetchSheet(sheetName) {
  const cleaned = normName(sheetName);
  const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID
    + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(cleaned);
  dbg('Fetching sheet: "' + cleaned + '"');

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 15000);

  let resp;
  try {
    resp = await fetch(url, { signal: controller.signal });
  } catch(e) {
    clearTimeout(timer);
    throw new Error('Red/timeout: ' + cleaned);
  }
  clearTimeout(timer);

  if (!resp.ok) throw new Error('HTTP ' + resp.status + ': ' + cleaned);

  const text = await resp.text();
  // La respuesta viene envuelta: /*O_o*/ google.visualization.Query.setResponse({...});
  const match = text.match(/setResponse\(([\s\S]*)\)/);
  if (!match) throw new Error('Formato inesperado: ' + cleaned);

  let data;
  try { data = JSON.parse(match[1]); } catch(e) { throw new Error('JSON invalido: ' + cleaned); }

  if (!data.table) throw new Error('Sin tabla: ' + cleaned);
  if (!data.table.cols || data.table.cols.length === 0) throw new Error('Pestana vacia o no encontrada: ' + cleaned);

  dbg('OK: ' + data.table.rows.length + ' filas en "' + cleaned + '"', 'd-ok');
  return data.table;
}

// ── Buscar pestaña con variantes del nombre ────────────────
// Intenta el nombre tal cual, luego uppercase, luego trim agresivo, etc.
async function fetchSheetRobust(empName) {
  const variants = buildVariants(empName);
  dbg('Variantes para "' + empName + '": ' + variants.join(' | '), 'd-info');

  for (const v of variants) {
    try {
      const table = await fetchSheet(v);
      dbg('✓ Encontrada con variante: "' + v + '"', 'd-ok');
      return { table, usedName: v };
    } catch(e) {
      dbg('✗ Falló variante: "' + v + '" — ' + e.message, 'd-err');
    }
  }
  return null;
}

function buildVariants(name) {
  const base = normName(name);
  const variants = new Set();

  variants.add(base);                                  // tal cual
  variants.add(base.toUpperCase());                    // TODO MAYÚSCULAS
  variants.add(toTitleCase(base));                     // Title Case
  variants.add(base.toLowerCase());                    // todo minúsculas

  // Quitar acentos
  const sinAcento = quitarAcentos(base);
  variants.add(sinAcento);
  variants.add(sinAcento.toUpperCase());
  variants.add(toTitleCase(sinAcento));

  // Solo primer nombre + apellidos (quitar segundo nombre si hay 3+ palabras)
  const parts = base.split(' ');
  if (parts.length >= 3) {
    const sinSegundo = [parts[0], ...parts.slice(2)].join(' ');
    variants.add(sinSegundo);
    variants.add(sinSegundo.toUpperCase());
  }

  // Nombre completo con espacios colapsados
  variants.add(base.replace(/\s+/g, ' ').trim());

  return [...variants];
}

function quitarAcentos(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function toTitleCase(s) {
  return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

// ── Parsear tabla gviz → array de objetos ──────────────────
function gvizToRows(table) {
  if (!table || !table.rows) return [];
  const cols = table.cols.map(c => (c.label || c.id || '').trim());
  return table.rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => {
      const cell = r.c && r.c[i];
      obj[c] = (cell != null) ? (cell.f != null ? cell.f : (cell.v != null ? cell.v : '')) : '';
      if (typeof obj[c] === 'number') obj[c] = String(obj[c]);
      obj[c] = String(obj[c]).trim();
    });
    return obj;
  });
}

// ── Parseo de fichajes ─────────────────────────────────────
function parsearFichajes(table) {
  const rows = gvizToRows(table);
  const registros = [];

  dbg('Filas en sheet: ' + rows.length);
  if (rows.length > 0) {
    dbg('Columnas: ' + Object.keys(rows[0]).join(' | '));
    dbg('Fila 1 muestra: ' + JSON.stringify(Object.values(rows[0]).slice(0,6)));
  }

  for (const row of rows) {
    const vals = Object.values(row);
    const tipoVal = vals.find(v => v === 'ENTRADA' || v === 'SALIDA');
    if (!tipoVal) continue;

    const keys = Object.keys(row);
    const tipoIdx = keys.findIndex(k => row[k] === 'ENTRADA' || row[k] === 'SALIDA');

    const fechaRaw = row[keys[0]] || '';
    const hora     = row[keys[tipoIdx + 1]] || '';
    const thVal    = row[keys[tipoIdx + 2]] || '';
    const thdVal   = row[keys[tipoIdx + 3]] || '';
    const lugar    = row[keys[tipoIdx + 4]] || '';

    const fechaISO = parseFecha(fechaRaw);
    if (!fechaISO) continue;

    registros.push({
      fecha:         fechaISO,
      fechaDisplay:  isoToDisplay(fechaISO),
      tipo:          tipoVal,
      hora:          normHora(hora),
      horaMins:      horaToMins(hora),
      totalHoras:    thVal,
      totalHorasDia: thdVal,
      lugar,
    });
  }

  dbg('Registros válidos parseados: ' + registros.length, registros.length > 0 ? 'd-ok' : 'd-err');
  return registros;
}

// ── Parseo de fechas ───────────────────────────────────────
function parseFecha(s) {
  s = String(s || '').trim();
  if (!s) return null;
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return m[3] + '-' + m[2].padStart(2,'0') + '-' + m[1].padStart(2,'0');
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return s.slice(0,10);
  m = s.match(/^Date\((\d+),(\d+),(\d+)\)$/);
  if (m) return m[1] + '-' + String(+m[2]+1).padStart(2,'0') + '-' + String(+m[3]).padStart(2,'0');
  return null;
}

function isoToDisplay(iso) {
  if (!iso) return '—';
  const [y,mo,d] = iso.split('-');
  return d + '/' + mo + '/' + y;
}

function horaToMins(s) {
  s = String(s || '').trim();
  const m = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
  if (m) return +m[1] * 60 + +m[2];
  const n = parseFloat(s);
  if (!isNaN(n) && n >= 0 && n < 1) return Math.round(n * 1440);
  return null;
}

function normHora(s) {
  const m = horaToMins(s);
  if (m == null) return s || '—';
  return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
}

function minsToStr(mins) {
  if (mins == null || mins < 0) return '—';
  return Math.floor(mins/60) + 'h ' + String(mins%60).padStart(2,'0') + 'min';
}

// ── Agrupar por día ────────────────────────────────────────
function agruparPorDia(registros) {
  const byDate = {};
  for (const r of registros) {
    if (!byDate[r.fecha]) byDate[r.fecha] = [];
    byDate[r.fecha].push(r);
  }
  return Object.keys(byDate).sort().map(fecha => {
    const regs  = byDate[fecha];
    const ents  = regs.filter(r => r.tipo === 'ENTRADA').sort((a,b) => (a.horaMins||0)-(b.horaMins||0));
    const sals  = regs.filter(r => r.tipo === 'SALIDA' ).sort((a,b) => (a.horaMins||0)-(b.horaMins||0));

    const first = ents[0] || null;
    const last  = sals[sals.length-1] || null;

    let mins = null;
    if (first && last && first.horaMins != null && last.horaMins != null) {
      mins = last.horaMins - first.horaMins;
      if (mins < 0) mins += 1440;
    }

    const thdReg = [...regs].reverse().find(r => r.totalHorasDia && r.totalHorasDia.toLowerCase() !== 'si' && r.totalHorasDia !== '');
    const horasDisplay = thdReg ? thdReg.totalHorasDia : (mins != null ? minsToStr(mins) : '—');
    const lugar = regs.find(r => r.lugar)?.lugar || '';

    let estado = 'ok';
    if (!first)                          estado = 'sin-entrada';
    else if (!last || sals.length === 0) estado = 'sin-salida';

    return {
      fecha, fechaDisplay: regs[0].fechaDisplay,
      primeraEntrada: first?.hora || '—',
      ultimaSalida:   last?.hora  || '—',
      horasDisplay, minsTotales: mins,
      nEnt: ents.length, nSal: sals.length,
      lugar, estado,
    };
  });
}

// ── Cargar empleados ───────────────────────────────────────
async function cargarEmpleados() {
  try {
    const table = await fetchSheet('EMPLEADOS');
    const rows  = gvizToRows(table);
    const found = rows
      .map(r => normName(String(Object.values(r)[0]||'')))
      .filter(v => v && !['nombre','empleado','name'].includes(v.toLowerCase()));
    empleados = found.length ? found : EMPLEADOS_DEFAULT;
    dbg('Empleados desde sheet: ' + empleados.length, 'd-ok');
  } catch(e) {
    dbg('Usando lista de empleados por defecto: ' + e.message, 'd-err');
    empleados = EMPLEADOS_DEFAULT;
  }
  renderEmpleados();
  setStatus('ok', empleados.length + ' empleados cargados');
  document.getElementById('btn-gen').disabled = false;
  toast('✓ ' + empleados.length + ' empleados listos');
}

function renderEmpleados() {
  document.getElementById('emp-list').innerHTML = empleados.map(emp =>
    '<label class="emp-row"><input type="checkbox" class="echk" value="' + escHtml(emp) + '" checked><label>' + escHtml(emp) + '</label></label>'
  ).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selAll()  { document.querySelectorAll('.echk').forEach(c => c.checked = true);  }
function selNone() { document.querySelectorAll('.echk').forEach(c => c.checked = false); }

// ── Generar informe ────────────────────────────────────────
async function generar() {
  try {
    const sel   = [...document.querySelectorAll('.echk:checked')].map(c => c.value);
    const desde = document.getElementById('f-desde').value;
    const hasta  = document.getElementById('f-hasta').value;

    if (!sel.length)       { toast('Selecciona al menos un empleado', true); return; }
    if (!desde || !hasta)  { toast('Elige el período de fechas', true); return; }
    if (desde > hasta)     { toast('La fecha inicio supera al fin', true); return; }

    document.getElementById('debug-toggle').style.display = 'block';
    document.getElementById('debug-panel').classList.add('on');
    dbg('=== INICIO GENERACIÓN ===', 'd-info');
    dbg('Empleados seleccionados: ' + sel.join(', '), 'd-info');

    const datos = {};
    const usedNames = {};

    for (const emp of sel) {
      setLoader(true, 'Leyendo: ' + emp + '...');
      dbg('--- Procesando: ' + emp + ' ---', 'd-info');
      const result = await fetchSheetRobust(emp);
      if (result) {
        datos[emp]     = parsearFichajes(result.table);
        usedNames[emp] = result.usedName;
      } else {
        datos[emp] = null;
        dbg('No se pudo acceder a ninguna variante de: ' + emp, 'd-err');
      }
    }
    setLoader(false);
    dbg('=== FIN GENERACION ===', 'd-info');
    pintarInforme(sel, desde, hasta, datos, usedNames);
  } catch(err) {
    setLoader(false);
    const dp = document.getElementById('debug-panel');
    if (dp) { dp.classList.add('on'); dbg('ERROR FATAL: ' + err.message, 'd-err'); }
    toast('Error: ' + err.message, true);
    console.error('generar() error:', err);
  }
}

// ── Pintar informe ─────────────────────────────────────────
function pintarInforme(sel, desde, hasta, datos, usedNames) {
  document.getElementById('empty').style.display = 'none';
  const rep = document.getElementById('report');
  rep.style.display = 'block';
  window._rData = { sel, desde, hasta, datos };

  let totMins=0, totDias=0, totSinSalida=0, totEmps=0;
  let html = '';

  for (const emp of sel) {
    const regs = datos[emp];
    if (!regs) {
      const intentados = buildVariants(emp).join(', ');
      html += seccionErr(emp,
        'No se encontró la pestaña para este empleado.',
        'Nombres intentados: <code style="font-size:.7rem;background:var(--paper-darker);padding:2px 6px;border-radius:3px">' + escHtml(intentados) + '</code>'
      );
      continue;
    }
    const filtrados = regs.filter(r => r.fecha >= desde && r.fecha <= hasta);
    if (!filtrados.length) {
      html += seccionErr(emp, 'Sin fichajes en el período seleccionado.', 'Pestaña leída como: <strong>' + escHtml(usedNames[emp]||emp) + '</strong>');
      continue;
    }

    const dias = agruparPorDia(filtrados);
    const empMins = dias.reduce((s,d) => s + (d.minsTotales || 0), 0);
    const sinSal  = dias.filter(d => d.estado === 'sin-salida').length;
    const sinEnt  = dias.filter(d => d.estado === 'sin-entrada').length;

    totMins += empMins; totDias += dias.length; totSinSalida += sinSal; totEmps++;

    const filas = dias.map(d => {
      const eTag = d.estado === 'sin-salida'  ? '<span class="tag t-err">Sin salida</span>'
                 : d.estado === 'sin-entrada' ? '<span class="tag t-warn">Sin entrada</span>'
                 : '<span class="tag t-ok">OK</span>';
      return '<tr>'
        + '<td style="font-family:\'DM Mono\',monospace;font-weight:500">' + d.fechaDisplay + '</td>'
        + '<td><span class="tag t-in">' + d.primeraEntrada + '</span></td>'
        + '<td><span class="tag t-out">' + d.ultimaSalida + '</span></td>'
        + '<td style="font-family:\'DM Mono\',monospace">' + d.horasDisplay + '</td>'
        + '<td style="text-align:center;color:var(--ink-soft)">' + d.nEnt + '</td>'
        + '<td style="text-align:center;color:var(--ink-soft)">' + d.nSal + '</td>'
        + '<td>' + eTag + '</td>'
        + '<td style="font-size:.7rem;color:var(--ink-muted)">' + escHtml(d.lugar||'—') + '</td>'
        + '</tr>';
    }).join('');

    const incidencias = [
      sinSal   ? '<span class="tag t-err">' + sinSal + ' sin salida</span>' : '',
      sinEnt   ? '<span class="tag t-warn">' + sinEnt + ' sin entrada</span>' : '',
      (!sinSal && !sinEnt) ? '<span class="tag t-ok">Sin incidencias</span>' : '',
    ].filter(Boolean).join(' ');

    html += '<div class="emp-section">'
      + '<div class="emp-sec-hdr"><span class="emp-sec-name">' + escHtml(emp) + '</span>'
      + '<span class="chip chip-blue">' + dias.length + ' días</span>'
      + '<span class="chip chip-green">' + minsToStr(empMins) + '</span></div>'
      + '<div class="emp-summary">'
      + '<div class="esm">Días: <strong>' + dias.length + '</strong></div>'
      + '<div class="esm">Horas totales: <strong>' + minsToStr(empMins) + '</strong></div>'
      + '<div class="esm">Sin salida: <strong>' + sinSal + '</strong></div>'
      + '<div class="esm">Fichajes/día: <strong>' + (filtrados.length / dias.length).toFixed(1) + '</strong></div>'
      + '</div>'
      + '<div class="twrap"><table>'
      + '<thead><tr><th>Fecha</th><th>1ª Entrada</th><th>Última Salida</th><th>Total horas</th><th>Entradas</th><th>Salidas</th><th>Estado</th><th>Lugar</th></tr></thead>'
      + '<tbody>' + filas + '</tbody>'
      + '<tfoot><tr class="tfoot-r"><td colspan="3">TOTAL ' + escHtml(emp.split(' ')[0]) + '</td>'
      + '<td>' + minsToStr(empMins) + '</td>'
      + '<td colspan="4">' + incidencias + '</td></tr></tfoot>'
      + '</table></div></div>';
  }

  rep.innerHTML = '<div class="rep-top">'
    + '<div><div class="rep-title">Informe de fichajes</div>'
    + '<div class="rep-meta">' + isoToDisplay(desde) + ' → ' + isoToDisplay(hasta) + ' · ' + sel.length + ' empleado(s)</div></div>'
    + '<button class="btn-xl" onclick="exportExcel()">'
    + '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM7.5 13h9v1h-9v-1zm0 3h9v1h-9v-1zm0 3h6v1h-6v-1z"/></svg>'
    + 'Exportar Excel</button></div>'
    + '<div class="kpis">'
    + kpi('g','Horas totales', minsToStr(totMins), 'período completo')
    + kpi('b','Días totales', totDias, totEmps + ' empleado(s)')
    + kpi('a','Promedio/empleado', totEmps ? minsToStr(Math.round(totMins/totEmps)) : '—', 'en el período')
    + kpi('r','Días sin salida', totSinSalida, 'registros incompletos')
    + '</div>'
    + html;
}

function kpi(cls, lbl, val, sub) {
  return '<div class="kpi ' + cls + '"><div class="kpi-lbl">' + lbl + '</div><div class="kpi-val">' + val + '</div><div class="kpi-sub">' + sub + '</div></div>';
}

function seccionErr(emp, msg, extra='') {
  return '<div class="emp-section">'
    + '<div class="emp-sec-hdr"><span class="emp-sec-name">' + escHtml(emp) + '</span>'
    + '<span class="chip" style="background:var(--accent-soft);color:var(--accent)">Error</span></div>'
    + '<p style="font-size:.78rem;color:var(--ink-muted);margin-bottom:.35rem">' + msg + '</p>'
    + (extra ? '<p style="font-size:.72rem;color:var(--ink-muted)">' + extra + '</p>' : '')
    + '</div>';
}

// ── Exportar Excel ─────────────────────────────────────────
function exportExcel() {
  const { sel, desde, hasta, datos } = window._rData || {};
  if (!datos) { toast('Genera un informe primero', true); return; }

  const wb = XLSX.utils.book_new();
  const resumen = [];

  for (const emp of sel) {
    const regs = datos[emp];
    if (!regs) continue;
    const filtrados = regs.filter(r => r.fecha >= desde && r.fecha <= hasta);
    if (!filtrados.length) continue;
    const dias = agruparPorDia(filtrados);
    const empMins = dias.reduce((s,d) => s+(d.minsTotales||0), 0);

    const wsRows = dias.map(d => ({
      'Fecha':           d.fechaDisplay,
      'Primera entrada': d.primeraEntrada,
      'Última salida':   d.ultimaSalida,
      'Total horas':     d.horasDisplay,
      'Horas (decimal)': d.minsTotales != null ? +(d.minsTotales/60).toFixed(2) : '',
      'Nº entradas':     d.nEnt,
      'Nº salidas':      d.nSal,
      'Estado':          d.estado === 'sin-salida' ? 'Sin salida' : d.estado === 'sin-entrada' ? 'Sin entrada' : 'OK',
      'Lugar':           d.lugar,
    }));

    const ws = XLSX.utils.json_to_sheet(wsRows);
    ws['!cols'] = [{wch:12},{wch:14},{wch:14},{wch:12},{wch:14},{wch:11},{wch:11},{wch:12},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, emp.substring(0,28).replace(/[:\\\/\?\*\[\]]/g,'_'));

    resumen.push({
      'Empleado':        emp,
      'Días trabajados': dias.length,
      'Horas totales':   minsToStr(empMins),
      'Horas (decimal)': +(empMins/60).toFixed(2),
      'Días sin salida': dias.filter(d=>d.estado==='sin-salida').length,
      'Días sin entrada':dias.filter(d=>d.estado==='sin-entrada').length,
    });
  }

  if (resumen.length) {
    const wsR = XLSX.utils.json_to_sheet(resumen);
    wsR['!cols'] = [{wch:28},{wch:15},{wch:14},{wch:14},{wch:15},{wch:15}];
    XLSX.utils.book_append_sheet(wb, wsR, 'RESUMEN');
    wb.SheetNames = ['RESUMEN', ...wb.SheetNames.filter(n=>n!=='RESUMEN')];
  }

  XLSX.writeFile(wb, 'Fichajes_' + desde + '_' + hasta + '.xlsx');
  toast('✓ Excel descargado');
}

// ── Init ───────────────────────────────────────────────────
(function() {
  const hoy = new Date();
  const p1  = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
  document.getElementById('f-hasta').value = hoy.toISOString().slice(0,10);
  document.getElementById('f-desde').value = p1.toISOString().slice(0,10);
  cargarEmpleados();
})();
</script>
