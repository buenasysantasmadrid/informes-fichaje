<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichajes · RRHH</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;
  --bg2:#181818;
  --bg3:#222;
  --line:#2e2e2e;
  --line2:#3a3a3a;
  --txt:#e8e4dc;
  --txt2:#888;
  --txt3:#555;
  --gold:#c9a96e;
  --gold2:#a07840;
  --red:#c0392b;
  --green:#27ae60;
  --amber:#e67e22;
  --blue:#2980b9;
  --r:6px;
}
html{font-size:15px;background:var(--bg)}
body{font-family:'DM Mono',monospace;color:var(--txt);min-height:100vh}

/* HEADER */
.hdr{
  background:var(--bg2);
  border-bottom:1px solid var(--line);
  padding:0 2rem;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hdr-logo{font-family:'Fraunces',serif;font-size:1.15rem;color:var(--gold);letter-spacing:.02em}
.hdr-logo span{color:var(--txt2);font-size:.7rem;font-family:'DM Mono',monospace;margin-left:10px}

/* LAYOUT */
.shell{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 56px)}

/* SIDEBAR */
.side{
  background:var(--bg2);
  border-right:1px solid var(--line);
  padding:1.5rem 1.25rem;
  display:flex;flex-direction:column;gap:1.4rem;
}
.lbl{
  font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--txt3);margin-bottom:.5rem;display:block;
}
.emp-list{
  display:flex;flex-direction:column;gap:2px;
  max-height:260px;overflow-y:auto;
  border:1px solid var(--line);border-radius:var(--r);
  background:var(--bg3);padding:4px;
}
.emp-list::-webkit-scrollbar{width:3px}
.emp-list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.emp-row{
  display:flex;align-items:center;gap:8px;
  padding:5px 8px;border-radius:4px;cursor:pointer;
}
.emp-row:hover{background:var(--line)}
.emp-row input{accent-color:var(--gold);width:13px;height:13px;flex-shrink:0;cursor:pointer}
.emp-row label{font-size:.74rem;cursor:pointer;color:var(--txt);line-height:1.3}
.emp-btns{display:flex;gap:6px;margin-bottom:5px}
.bxs{
  padding:3px 10px;font-size:.65rem;font-family:'DM Mono',monospace;
  border:1px solid var(--line2);background:var(--bg3);
  border-radius:4px;cursor:pointer;color:var(--txt2);transition:all .15s;
}
.bxs:hover{background:var(--gold);color:#000;border-color:var(--gold)}

.date-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.df{display:flex;flex-direction:column;gap:4px}
.df span{font-size:.62rem;color:var(--txt3)}
.df input[type=date]{
  padding:6px 8px;font-family:'DM Mono',monospace;font-size:.7rem;
  background:var(--bg3);border:1px solid var(--line2);
  border-radius:var(--r);color:var(--txt);outline:none;width:100%;
}
.df input:focus{border-color:var(--gold)}

.btn-gen{
  width:100%;padding:10px;
  background:var(--gold);color:#000;
  border:none;border-radius:var(--r);
  font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;
  cursor:pointer;letter-spacing:.06em;transition:opacity .15s;
}
.btn-gen:hover{opacity:.85}
.btn-gen:disabled{opacity:.3;cursor:not-allowed}

.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);display:inline-block;margin-right:6px;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-dot.ok{background:var(--green);animation:none}
.status-dot.err{background:var(--red);animation:none}
#stxt{font-size:.65rem;color:var(--txt3)}

/* MAIN */
.main{padding:2rem;overflow-x:hidden}

.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:60vh;gap:.75rem;text-align:center;
}
.empty-ico{font-size:2.5rem;opacity:.15}
.empty h2{font-family:'Fraunces',serif;font-size:1.4rem;color:var(--txt2);font-weight:300}
.empty p{font-size:.72rem;color:var(--txt3);max-width:280px;line-height:1.7}

/* EMP SECTION */
.emp-block{margin-bottom:3rem}
.emp-name{
  font-family:'Fraunces',serif;font-size:1.5rem;font-weight:300;
  color:var(--gold);margin-bottom:.35rem;
}
.emp-meta{font-size:.65rem;color:var(--txt3);margin-bottom:1.5rem}

/* SUMMARY PILLS */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.75rem}
.pill{
  padding:5px 14px;border-radius:20px;
  font-size:.65rem;border:1px solid var(--line2);color:var(--txt2);
}
.pill strong{color:var(--txt)}
.pill.g{border-color:#27ae6044;background:#27ae6011;color:#4ecb7a}
.pill.r{border-color:#c0392b44;background:#c0392b11;color:#e05a4b}
.pill.a{border-color:#e67e2244;background:#e67e2211;color:#f39c12}

/* DAY CARDS */
.days{display:flex;flex-direction:column;gap:12px}

.day-card{
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  transition:border-color .2s;
}
.day-card:hover{border-color:var(--line2)}
.day-card.has-error{border-color:#c0392b55}
.day-card.has-warn{border-color:#e67e2233}

.day-head{
  display:flex;align-items:center;gap:0;
  padding:.75rem 1.1rem;
  cursor:pointer;
  user-select:none;
}
.day-head:hover .day-name{color:var(--gold)}

.day-dow{
  font-family:'Fraunces',serif;font-size:1.05rem;font-weight:300;
  color:var(--txt2);width:110px;flex-shrink:0;text-transform:capitalize;
}
.day-date{
  font-size:.68rem;color:var(--txt3);width:90px;flex-shrink:0;
}
.day-summary{
  display:flex;align-items:center;gap:12px;flex:1;
}
.time-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:.68rem;
}
.tc-in{background:#27ae6018;color:#4ecb7a;border:1px solid #27ae6033}
.tc-out{background:#2980b918;color:#5dade2;border:1px solid #2980b933}
.tc-dur{background:#c9a96e18;color:var(--gold);border:1px solid #c9a96e33}
.tc-err{background:#c0392b18;color:#e05a4b;border:1px solid #c0392b33}
.tc-warn{background:#e67e2218;color:#f39c12;border:1px solid #e67e2233}

.day-chevron{
  margin-left:auto;color:var(--txt3);font-size:.7rem;
  transition:transform .2s;flex-shrink:0;
}
.day-card.open .day-chevron{transform:rotate(180deg)}

/* DAY BODY (fichajes detalle) */
.day-body{
  display:none;
  border-top:1px solid var(--line);
  padding:.9rem 1.1rem;
}
.day-card.open .day-body{display:block}

.fichajes-table{width:100%;border-collapse:collapse;margin-bottom:.75rem}
.fichajes-table th{
  font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--txt3);padding:4px 10px;text-align:left;
  border-bottom:1px solid var(--line);
}
.fichajes-table td{
  padding:5px 10px;font-size:.75rem;
  border-bottom:1px solid var(--line);vertical-align:middle;
}
.fichajes-table tr:last-child td{border-bottom:none}
.fichajes-table tr:hover td{background:rgba(255,255,255,.02)}

/* Tipo badge */
.tipo-in{color:#4ecb7a}
.tipo-out{color:#5dade2}

/* Edit mode */
.hora-cell{position:relative}
.hora-display{cursor:pointer;padding:2px 6px;border-radius:3px;transition:background .15s}
.hora-display:hover{background:var(--line2);color:var(--gold)}
.hora-input{
  font-family:'DM Mono',monospace;font-size:.75rem;
  background:var(--bg3);border:1px solid var(--gold);
  border-radius:3px;color:var(--txt);padding:2px 6px;
  width:70px;outline:none;display:none;
}
.hora-input.editing{display:inline-block}
.hora-display.editing{display:none}

.edit-hint{font-size:.6rem;color:var(--txt3);margin-top:.5rem;font-style:italic}

/* Add / delete row buttons */
.day-actions{display:flex;gap:8px;margin-top:.5rem}
.btn-add{
  padding:4px 12px;font-size:.65rem;font-family:'DM Mono',monospace;
  background:transparent;border:1px solid var(--line2);
  border-radius:4px;color:var(--txt2);cursor:pointer;transition:all .15s;
}
.btn-add:hover{border-color:var(--gold);color:var(--gold)}
.btn-del{
  background:transparent;border:none;
  color:var(--txt3);cursor:pointer;font-size:.8rem;
  padding:0 4px;transition:color .15s;
}
.btn-del:hover{color:var(--red)}

/* Loader */
.loader{
  display:none;position:fixed;inset:0;
  background:rgba(15,15,15,.85);z-index:500;
  flex-direction:column;align-items:center;justify-content:center;gap:1rem;
}
.loader.on{display:flex}
.spin{
  width:32px;height:32px;border:2px solid var(--line2);
  border-top-color:var(--gold);border-radius:50%;
  animation:rot .6s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}
.ltxt{font-size:.72rem;color:var(--txt2)}

/* Toast */
.toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--bg3);color:var(--txt);
  border:1px solid var(--line2);
  padding:8px 16px;border-radius:var(--r);
  font-size:.72rem;z-index:600;
  opacity:0;transform:translateY(8px);
  transition:all .2s;pointer-events:none;
}
.toast.on{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--green);color:#4ecb7a}
.toast.err{border-color:var(--red);color:#e05a4b}

/* Export btn */
.export-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 16px;font-size:.7rem;font-family:'DM Mono',monospace;
  background:transparent;border:1px solid var(--line2);
  border-radius:var(--r);color:var(--txt2);cursor:pointer;transition:all .15s;
  margin-bottom:1.5rem;
}
.export-btn:hover{border-color:var(--gold);color:var(--gold)}

@media(max-width:700px){
  .shell{grid-template-columns:1fr}
  .side{border-right:none;border-bottom:1px solid var(--line)}
  .main{padding:1rem}
  .day-dow{width:80px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">Fichajes <span>RRHH · 2026</span></div>
  <div style="display:flex;align-items:center">
    <span class="status-dot" id="sdot"></span>
    <span id="stxt">Conectando...</span>
  </div>
</header>

<div class="shell">
  <aside class="side">
    <div>
      <span class="lbl">Empleados</span>
      <div class="emp-btns">
        <button class="bxs" onclick="selAll()">Todos</button>
        <button class="bxs" onclick="selNone()">Ninguno</button>
      </div>
      <div class="emp-list" id="emp-list">
        <span style="font-size:.7rem;color:var(--txt3);padding:8px">Cargando...</span>
      </div>
    </div>

    <div>
      <span class="lbl">Período</span>
      <div class="date-row">
        <div class="df"><span>Desde</span><input type="date" id="f-desde"></div>
        <div class="df"><span>Hasta</span><input type="date" id="f-hasta"></div>
      </div>
    </div>

    <button class="btn-gen" id="btn-gen" onclick="generar()" disabled>Generar informe</button>
  </aside>

  <main class="main" id="main">
    <div class="empty" id="empty">
      <div class="empty-ico">🗓</div>
      <h2>Sin datos aún</h2>
      <p>Selecciona empleados y período, luego pulsa generar.</p>
    </div>
    <div id="report" style="display:none"></div>
  </main>
</div>

<div class="loader" id="loader"><div class="spin"></div><div class="ltxt" id="ltxt">Cargando...</div></div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SHEET_ID = '1AHGLfzT-yF2kkPUS8IlygX9TAL6poYVnxBmoI_p-550';
const DIAS_ES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let empleados = [];
// Almacén editable: editData[emp][fecha] = [{tipo, hora}, ...]
let editData = {};

// ── UI helpers ─────────────────────────────────────────────
function toast(msg, cls='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on ' + cls;
  setTimeout(() => t.className = 'toast', 3000);
}
function setLoader(on, msg='') {
  document.getElementById('loader').classList.toggle('on', on);
  if (msg) document.getElementById('ltxt').textContent = msg;
}
function setStatus(cls, msg) {
  document.getElementById('sdot').className = 'status-dot ' + cls;
  document.getElementById('stxt').textContent = msg;
}

// ── Fetch sheet ────────────────────────────────────────────
async function fetchSheet(sheetName) {
  const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID
    + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheetName.trim());
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 12000);
  let resp;
  try { resp = await fetch(url, {signal: ctrl.signal}); }
  catch(e) { clearTimeout(timer); throw new Error('Red: ' + sheetName); }
  clearTimeout(timer);
  const text = await resp.text();
  const m = text.match(/setResponse\(([\s\S]*)\)\s*;?\s*$/);
  if (!m) throw new Error('Sin respuesta válida: ' + sheetName);
  const data = JSON.parse(m[1]);
  if (data.status === 'error') throw new Error('Sheet no encontrada: ' + sheetName);
  return data.table;
}

// ── Parsear tabla → array de fichajes {fecha, tipo, hora} ──
function parsearTabla(table) {
  if (!table || !table.rows) return [];
  const out = [];
  for (const row of table.rows) {
    const c = row.c || [];
    const get = i => (c[i] && c[i].v != null) ? String(c[i].v).trim() : '';
    const fecha = parseFecha(get(0));
    const tipo  = get(1).toUpperCase();
    const hora  = get(2);
    if (!fecha || (tipo !== 'ENTRADA' && tipo !== 'SALIDA') || !hora) continue;
    out.push({ fecha, tipo, hora: normHora(hora) });
  }
  return out;
}

// ── Fecha helpers ──────────────────────────────────────────
function parseFecha(s) {
  s = String(s||'').trim();
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return s.slice(0,10);
  m = s.match(/^Date\((\d+),(\d+),(\d+)\)$/);
  if (m) return m[1]+'-'+String(+m[2]+1).padStart(2,'0')+'-'+String(+m[3]).padStart(2,'0');
  return null;
}

function isoToDate(iso) {
  const [y,mo,d] = iso.split('-').map(Number);
  return new Date(y, mo-1, d);
}

function isoDisplay(iso) {
  const [y,mo,d] = iso.split('-');
  return d+'/'+mo+'/'+y;
}

function dowName(iso) {
  return DIAS_ES[isoToDate(iso).getDay()];
}

// ── Hora helpers ───────────────────────────────────────────
function horaToMins(s) {
  const m = String(s||'').match(/^(\d{1,2}):(\d{2})/);
  if (m) return +m[1]*60 + +m[2];
  return null;
}

function normHora(s) {
  const m = horaToMins(s);
  if (m == null) return s || '';
  return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
}

function minsToStr(mins) {
  if (mins == null || mins < 0) return '—';
  return Math.floor(mins/60)+'h '+String(mins%60).padStart(2,'0')+'min';
}

// ── Agrupar fichajes por día ───────────────────────────────
function agruparPorDia(fichajes) {
  const map = {};
  for (const f of fichajes) {
    if (!map[f.fecha]) map[f.fecha] = [];
    map[f.fecha].push({tipo: f.tipo, hora: f.hora});
  }
  return map;
}

// ── Calcular resumen de un día ─────────────────────────────
function calcDia(registros) {
  const sorted = [...registros].sort((a,b) => (horaToMins(a.hora)||0)-(horaToMins(b.hora)||0));
  const entradas = sorted.filter(r => r.tipo === 'ENTRADA');
  const salidas  = sorted.filter(r => r.tipo === 'SALIDA');
  const primera  = entradas[0]?.hora || null;
  const ultima   = salidas[salidas.length-1]?.hora || null;
  let mins = null;
  if (primera && ultima) {
    mins = (horaToMins(ultima)||0) - (horaToMins(primera)||0);
    if (mins < 0) mins += 1440;
  }
  const estado = !primera ? 'sin-entrada' : !ultima ? 'sin-salida' : 'ok';
  return { primera, ultima, mins, estado };
}

// ── Cargar empleados ───────────────────────────────────────
async function cargarEmpleados() {
  try {
    const table = await fetchSheet('EMPLEADOS');
    const rows  = table.rows || [];
    const found = rows.map(r => {
      const c = r.c || [];
      return c[0] && c[0].v ? String(c[0].v).trim() : '';
    }).filter(v => v && !['nombre','empleado','name'].includes(v.toLowerCase()));
    empleados = found.length ? found : EMPLEADOS_DEFAULT;
    setStatus('ok', empleados.length + ' empleados');
  } catch(e) {
    empleados = EMPLEADOS_DEFAULT;
    setStatus('ok', empleados.length + ' empleados (default)');
  }
  renderEmpleados();
  document.getElementById('btn-gen').disabled = false;
}

const EMPLEADOS_DEFAULT = [
  'LUCIANA Fisbein Efron','RICHARD Silva Vera','ANA HILDA MIRANDA ROCHA',
  'JESSICA Arribas Caravaca','JULIO Morales Romero','MARIA LUZ Nuñez Fuentes',
  'RAMIRO DAMIAN Martinez Chapper','SHENAY Nazimova Cholakova','YAMILA Fisbein Efron'
];

function renderEmpleados() {
  document.getElementById('emp-list').innerHTML = empleados.map(e =>
    `<label class="emp-row"><input type="checkbox" class="echk" value="${esc(e)}" checked><label>${esc(e)}</label></label>`
  ).join('');
}

function selAll()  { document.querySelectorAll('.echk').forEach(c => c.checked=true); }
function selNone() { document.querySelectorAll('.echk').forEach(c => c.checked=false); }
function esc(s)    { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Generar ────────────────────────────────────────────────
async function generar() {
  const sel   = [...document.querySelectorAll('.echk:checked')].map(c => c.value);
  const desde = document.getElementById('f-desde').value;
  const hasta  = document.getElementById('f-hasta').value;
  if (!sel.length)      { toast('Selecciona al menos un empleado','err'); return; }
  if (!desde || !hasta) { toast('Elige el período','err'); return; }
  if (desde > hasta)    { toast('Fecha inicio > fin','err'); return; }

  editData = {};
  for (const emp of sel) {
    setLoader(true, 'Cargando ' + emp.split(' ')[0] + '...');
    try {
      const table    = await fetchSheet(emp);
      const fichajes = parsearTabla(table);
      const filtrado = fichajes.filter(f => f.fecha >= desde && f.fecha <= hasta);
      editData[emp]  = agruparPorDia(filtrado);
    } catch(e) {
      editData[emp] = null;
    }
  }
  setLoader(false);
  render(sel, desde, hasta);
}

// ── Render principal ───────────────────────────────────────
function render(sel, desde, hasta) {
  document.getElementById('empty').style.display = 'none';
  const rep = document.getElementById('report');
  rep.style.display = 'block';

  // Generar rango de fechas
  const fechas = [];
  const cur = new Date(desde + 'T00:00:00');
  const end = new Date(hasta + 'T00:00:00');
  while (cur <= end) {
    fechas.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }

  let html = '';
  for (const emp of sel) {
    html += renderEmp(emp, fechas);
  }

  rep.innerHTML = html;
  // Bind events después de insertar el HTML
  bindEvents();
}

function renderEmp(emp, fechas) {
  const dmap = editData[emp];

  if (!dmap) {
    return `<div class="emp-block">
      <div class="emp-name">${esc(emp)}</div>
      <div class="emp-meta" style="color:#e05a4b">No se encontró la pestaña en el sheet.</div>
    </div>`;
  }

  // Stats globales
  let totalMins = 0, diasOk = 0, sinSalida = 0, sinEntrada = 0;
  for (const f of fechas) {
    const regs = dmap[f] || [];
    if (!regs.length) continue;
    const {mins, estado} = calcDia(regs);
    if (mins != null) { totalMins += mins; diasOk++; }
    if (estado === 'sin-salida')  sinSalida++;
    if (estado === 'sin-entrada') sinEntrada++;
  }

  const pills = `
    <div class="pills">
      <div class="pill g">Total <strong>${minsToStr(totalMins)}</strong></div>
      <div class="pill">Días con fichaje <strong>${diasOk}</strong></div>
      ${sinSalida  ? `<div class="pill r">Sin salida <strong>${sinSalida}</strong></div>` : ''}
      ${sinEntrada ? `<div class="pill a">Sin entrada <strong>${sinEntrada}</strong></div>` : ''}
    </div>`;

  const cards = fechas.map(f => renderDayCard(emp, f, dmap[f] || [])).join('');

  return `<div class="emp-block" data-emp="${esc(emp)}">
    <div class="emp-name">${esc(emp)}</div>
    <div class="emp-meta">${fechas.length} días · ${fechas[0] ? isoDisplay(fechas[0]) : ''} → ${fechas[fechas.length-1] ? isoDisplay(fechas[fechas.length-1]) : ''}</div>
    ${pills}
    <button class="export-btn" onclick="exportEmp('${esc(emp)}')">↓ Exportar Excel</button>
    <div class="days">${cards}</div>
  </div>`;
}

function renderDayCard(emp, fecha, registros) {
  const dow   = dowName(fecha);
  const dis   = isoDisplay(fecha);
  const {primera, ultima, mins, estado} = calcDia(registros);
  const vacio = registros.length === 0;

  let cls = '';
  if (estado === 'sin-salida')  cls = 'has-error';
  if (estado === 'sin-entrada') cls = 'has-warn';
  if (vacio) cls = '';

  // Summary chips
  let chips = '';
  if (vacio) {
    chips = `<span class="time-chip" style="color:var(--txt3);border-color:var(--line)">sin fichajes</span>`;
  } else {
    if (primera) chips += `<span class="time-chip tc-in">▶ ${primera}</span>`;
    if (ultima)  chips += `<span class="time-chip tc-out">◼ ${ultima}</span>`;
    if (mins != null) chips += `<span class="time-chip tc-dur">${minsToStr(mins)}</span>`;
    if (estado === 'sin-salida')  chips += `<span class="time-chip tc-err">sin salida</span>`;
    if (estado === 'sin-entrada') chips += `<span class="time-chip tc-warn">sin entrada</span>`;
  }

  // Tabla de registros editables
  const filas = registros.map((r, i) => `
    <tr data-emp="${esc(emp)}" data-fecha="${fecha}" data-idx="${i}">
      <td class="${r.tipo==='ENTRADA'?'tipo-in':'tipo-out'}">${r.tipo}</td>
      <td class="hora-cell">
        <span class="hora-display" onclick="startEdit(this)">${esc(r.hora)}</span>
        <input class="hora-input" type="time" value="${r.hora}" 
          onblur="saveEdit(this)" onkeydown="keyEdit(event,this)">
      </td>
      <td><button class="btn-del" title="Eliminar" onclick="delRow('${esc(emp)}','${fecha}',${i})">✕</button></td>
    </tr>`).join('');

  const tabla = registros.length ? `
    <table class="fichajes-table">
      <thead><tr><th>Tipo</th><th>Hora</th><th></th></tr></thead>
      <tbody>${filas}</tbody>
    </table>` : `<p style="font-size:.7rem;color:var(--txt3);margin-bottom:.6rem">Sin registros este día.</p>`;

  return `<div class="day-card ${cls}" id="card-${esc(emp).replace(/\s/g,'_')}-${fecha}">
    <div class="day-head" onclick="toggleCard(this)">
      <span class="day-dow">${dow}</span>
      <span class="day-date">${dis}</span>
      <div class="day-summary">${chips}</div>
      <span class="day-chevron">▾</span>
    </div>
    <div class="day-body">
      ${tabla}
      <div class="day-actions">
        <button class="btn-add" onclick="addRow('${esc(emp)}','${fecha}','ENTRADA')">+ Entrada</button>
        <button class="btn-add" onclick="addRow('${esc(emp)}','${fecha}','SALIDA')">+ Salida</button>
      </div>
      <div class="edit-hint">Pulsa una hora para editarla · Enter para confirmar · Esc para cancelar</div>
    </div>
  </div>`;
}

// ── Toggle card ────────────────────────────────────────────
function toggleCard(head) {
  head.parentElement.classList.toggle('open');
}

// ── Edición inline ─────────────────────────────────────────
function startEdit(span) {
  const input = span.nextElementSibling;
  span.classList.add('editing');
  input.classList.add('editing');
  input.focus();
  input.select();
}

function saveEdit(input) {
  const span = input.previousElementSibling;
  const row  = input.closest('tr');
  const emp  = row.dataset.emp;
  const fecha= row.dataset.fecha;
  const idx  = +row.dataset.idx;

  const val = normHora(input.value);
  if (val && /^\d{2}:\d{2}$/.test(val)) {
    editData[emp][fecha][idx].hora = val;
    span.textContent = val;
    toast('Hora actualizada: ' + val, 'ok');
  }
  span.classList.remove('editing');
  input.classList.remove('editing');
  refreshCard(emp, fecha);
}

function keyEdit(e, input) {
  if (e.key === 'Enter') { input.blur(); }
  if (e.key === 'Escape') {
    const span = input.previousElementSibling;
    span.classList.remove('editing');
    input.classList.remove('editing');
  }
}

// ── Añadir fila ────────────────────────────────────────────
function addRow(emp, fecha, tipo) {
  if (!editData[emp][fecha]) editData[emp][fecha] = [];
  editData[emp][fecha].push({ tipo, hora: tipo === 'ENTRADA' ? '08:00' : '17:00' });
  refreshCard(emp, fecha);
  toast('Añadido: ' + tipo, 'ok');
}

// ── Eliminar fila ──────────────────────────────────────────
function delRow(emp, fecha, idx) {
  editData[emp][fecha].splice(idx, 1);
  refreshCard(emp, fecha);
  toast('Registro eliminado', 'ok');
}

// ── Refresca una card sin re-renderizar todo ───────────────
function refreshCard(emp, fecha) {
  const id   = 'card-' + emp.replace(/\s/g,'_') + '-' + fecha;
  const card = document.getElementById(id);
  if (!card) return;
  const wasOpen = card.classList.contains('open');
  const regs    = editData[emp][fecha] || [];
  const newHtml = renderDayCard(emp, fecha, regs);
  const div     = document.createElement('div');
  div.innerHTML = newHtml;
  const newCard = div.firstElementChild;
  if (wasOpen) newCard.classList.add('open');
  card.replaceWith(newCard);
  // Re-bind no hace falta porque usamos onclick inline
}

function bindEvents() {
  // Los eventos son inline en el HTML generado, nada extra necesario
}

// ── Export Excel ───────────────────────────────────────────
function exportEmp(emp) {
  const dmap = editData[emp];
  if (!dmap) return;
  const wb = XLSX.utils.book_new();
  const rows = [];
  const fechas = Object.keys(dmap).sort();
  for (const f of fechas) {
    const regs = dmap[f] || [];
    const {primera, ultima, mins} = calcDia(regs);
    rows.push({
      'Día':             dowName(f),
      'Fecha':           isoDisplay(f),
      '1ª Entrada':      primera || '—',
      'Última Salida':   ultima  || '—',
      'Total':           minsToStr(mins),
      'Horas (decimal)': mins != null ? +(mins/60).toFixed(2) : '',
      'Nº fichajes':     regs.length,
    });
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:11},{wch:11},{wch:13},{wch:10},{wch:14},{wch:11}];
  XLSX.utils.book_append_sheet(wb, ws, emp.substring(0,28).replace(/[:\\\/\?\*\[\]]/g,'_'));
  XLSX.writeFile(wb, 'Fichajes_' + emp.split(' ')[0] + '.xlsx');
  toast('Excel descargado', 'ok');
}

// ── Init ───────────────────────────────────────────────────
(function() {
  const hoy = new Date();
  const p1  = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
  document.getElementById('f-hasta').value = hoy.toISOString().slice(0,10);
  document.getElementById('f-desde').value = p1.toISOString().slice(0,10);
  cargarEmpleados();
})();
</script>
